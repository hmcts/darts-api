---
name: PR Tasks
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
permissions:
  contents: read
jobs:
  set-internal-ad-callback-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Set Internal AD callback URLs
        run: |
          authCallbackUrl="https://darts-portal-api-pr-${PR_NUMBER}.dev.platform.hmcts.net/auth/internal/callback"
          logoutUrl="https://darts-portal-api-pr-${PR_NUMBER}.dev.platform.hmcts.net/auth/internal/logout-callback"
          targetAppName="darts-stg"
          appId="dec3be30-6325-4335-b898-eb01985d6c90"

          if [[ -z "${AZURE_CLIENT_ID}" || -z "${AZURE_CLIENT_SECRET}" || -z "${AZURE_TENANT_ID}" ]]; then
            echo "::error::Missing Azure service principal secrets for internal AD callback URL setup"
            exit 1
          fi

          az login --service-principal --username "${AZURE_CLIENT_ID}" --password="${AZURE_CLIENT_SECRET}" --tenant "${AZURE_TENANT_ID}" --allow-no-subscriptions

          replyUrls=$(az ad app show --id "$appId" --query "web.redirectUris" -o json --only-show-errors)
          echo "Found callback URLs"
          echo $replyUrls

          if [[ -z "${replyUrls}" ]]; then
            echo "No callback URLs Found. ISSUE!!"
          elif jq -e --arg authCallbackUrl "$authCallbackUrl" --arg logoutUrl "$logoutUrl" 'index($authCallbackUrl) and index($logoutUrl)' <<< "$replyUrls" > /dev/null; then
            echo "Callback URLs contain $authCallbackUrl and $logoutUrl"
          else
            replyUrls=$(jq --arg authCallbackUrl "$authCallbackUrl" --arg logoutUrl "$logoutUrl" -c 'reduce [$authCallbackUrl, $logoutUrl][] as $url (.; if index($url) then . else . + [$url] end)' <<< "$replyUrls")
            echo "Setting callback URLs: $replyUrls"

            objectId=$(az ad app list --all --filter "displayname eq '${targetAppName}'" --query "[0].id" -o tsv --only-show-errors)
            objectId=${objectId//[$'\t\r\n']/}
            echo "Object ID: $objectId"
            restUrl="https://graph.microsoft.com/v1.0/applications/${objectId//[$'\t\r\n']/}"
            echo "Calling: $restUrl"
            az rest --method PATCH --header "Content-Type=application/json" --uri $restUrl --body "{\"web\":{\"redirectUris\":$replyUrls}}"
          fi
        env:
          PR_NUMBER: ${{ github.event.number }}
          AZURE_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.SP_SECRET_KEY }}
          AZURE_TENANT_ID: ${{ secrets.SP_TENANT_ID }}
  set-external-ad-b2c-callback-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Set External AD B2C callback URLs
        run: |
          authCallbackUrl="https://darts-portal-api-pr-${PR_NUMBER}.dev.platform.hmcts.net/auth/callback"
          logoutUrl="https://darts-portal-api-pr-${PR_NUMBER}.dev.platform.hmcts.net/auth/logout-callback"
          targetAppName="darts"
          appId="363c11cb-48b9-44bf-9d06-9a3973f6f413"

          if [[ -z "${AZURE_CLIENT_ID}" || -z "${AZURE_CLIENT_SECRET}" || -z "${AZURE_TENANT_ID}" ]]; then
            echo "::error::Missing Azure service principal secrets for external AD B2C callback URL setup"
            exit 1
          fi

          az login --service-principal --username "${AZURE_CLIENT_ID}" --password="${AZURE_CLIENT_SECRET}" --tenant "${AZURE_TENANT_ID}" --allow-no-subscriptions

          replyUrls=$(az ad app show --id "$appId" --query "web.redirectUris" -o json --only-show-errors)
          echo "Found Reply URLs"
          echo $replyUrls

          if [[ -z "${replyUrls}" ]]; then
            echo "No callback URLs Found. ISSUE!!"
          elif jq -e --arg authCallbackUrl "$authCallbackUrl" --arg logoutUrl "$logoutUrl" 'index($authCallbackUrl) and index($logoutUrl)' <<< "$replyUrls" > /dev/null; then
            echo "Callback URLs contain $authCallbackUrl and $logoutUrl"
          else
            replyUrls=$(jq --arg authCallbackUrl "$authCallbackUrl" --arg logoutUrl "$logoutUrl" -c 'reduce [$authCallbackUrl, $logoutUrl][] as $url (.; if index($url) then . else . + [$url] end)' <<< "$replyUrls")
            echo "Setting callback URLs: $replyUrls"

            objectId=$(az ad app list --all --filter "displayname eq '${targetAppName}'" --query "[0].id" -o tsv --only-show-errors)
            objectId=${objectId//[$'\t\r\n']/}
            echo "Object ID: $objectId"
            restUrl="https://graph.microsoft.com/v1.0/applications/${objectId//[$'\t\r\n']/}"
            echo "Calling: $restUrl"
            az rest --method PATCH --header "Content-Type=application/json" --uri $restUrl --body "{\"web\":{\"redirectUris\":$replyUrls}}" #--debug
          fi
        env:
          PR_NUMBER: ${{ github.event.number }}
          AZURE_CLIENT_ID: ${{ secrets.SP_CLIENT_ID_B2C }}
          AZURE_CLIENT_SECRET: ${{ secrets.SP_SECRET_KEY_B2C }}
          AZURE_TENANT_ID: ${{ secrets.SP_TENANT_ID_B2C }}
